services:
  mysql:
    image: mysql:8.0
    container_name: ai_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ai_workbench
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/scripts/migrate.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: [
        "CMD-SHELL",
        "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"
      ]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: ai_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 4000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ai_workbench
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 2h
      BCRYPT_SALT_ROUNDS: 10
      CORS_ORIGIN: ${CORS_ORIGIN}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      QQ_MAIL_USER: ${QQ_MAIL_USER}
      QQ_MAIL_AUTH_CODE: ${QQ_MAIL_AUTH_CODE}
      MCP_ENABLED: ${MCP_ENABLED}
      MCP_TOOL_WHITELIST: ${MCP_TOOL_WHITELIST}
      MCP_MAX_CALL_ROUNDS: ${MCP_MAX_CALL_ROUNDS}
      MCP_TOOL_TIMEOUT_MS: ${MCP_TOOL_TIMEOUT_MS}
      MCP_TOOL_MAX_RETRIES: ${MCP_TOOL_MAX_RETRIES}
      MCP_RETRY_BACKOFF_MS: ${MCP_RETRY_BACKOFF_MS}
      MCP_TOGGLE_CACHE_TTL_MS: ${MCP_TOGGLE_CACHE_TTL_MS}
      MCP_ADMIN_USER_IDS: ${MCP_ADMIN_USER_IDS}
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      args:
        PUBLIC_PATH: /ai_project/workbenchByAgent
    container_name: ai_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
