openapi: 3.0.0
info:
  title: Todo API
  version: 1.0.0
paths:
  /todos:
    get:
      summary: List todos for current user
      responses:
        '200':
          description: A list of todos
    post:
      summary: Create a new todo
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: {type: string}
                description: {type: string}
      responses:
        '201':
          description: Created
  /todos/{id}:
    patch:
      summary: Update todo status or content
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
      responses:
        '200':
          description: Updated
    delete:
      summary: Delete todo
      responses:
        '204':
          description: Deleted
